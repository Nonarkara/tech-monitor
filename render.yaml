services:
  - type: web
    name: middle-east-monitor
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "4000"
      - key: COPERNICUS_CLIENT_ID
        sync: false
      - key: COPERNICUS_CLIENT_SECRET
        sync: false
      - key: FIRMS_MAP_KEY
        sync: false
